name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: 04_multi_provider

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v
        working-directory: 04_multi_provider

      # ---------------------------------------------------------------------------
      # Integration tests (disabled by default — require real API keys)
      #
      # To enable them, add the following secrets to your GitHub repository:
      #   Settings → Secrets and variables → Actions → New repository secret
      #
      #   OPENAI_API_KEY    → your OpenAI API key (sk-...)
      #   ANTHROPIC_API_KEY → your Anthropic API key (sk-ant-...)
      #   GEMINI_API_KEY    → your Google AI Studio API key (AI...)
      #
      # Then uncomment the step below and commit.  The secrets are injected into
      # the .env file at the repo root so that load_dotenv() picks them up.
      # ---------------------------------------------------------------------------

